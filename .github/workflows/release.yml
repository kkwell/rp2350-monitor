name: Release Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish versioned release
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout firmware
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            libusb-1.0-0-dev \
            ninja-build \
            pkg-config \
            python3

      - name: Resolve firmware version
        id: version
        run: |
          version="$(sed -n 's/.*RPMON_FW_VERSION="\([^"]*\)".*/\1/p' CMakeLists.txt | head -n 1)"
          if [ -z "$version" ]; then
            echo "Unable to find RPMON_FW_VERSION in CMakeLists.txt" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Skip existing release tags
        id: existing
        run: |
          if git rev-parse -q --verify "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Pico SDK
        if: steps.existing.outputs.exists == 'false'
        run: |
          git clone --branch 2.2.0 --depth 1 https://github.com/raspberrypi/pico-sdk.git "$RUNNER_TEMP/pico-sdk"
          git -C "$RUNNER_TEMP/pico-sdk" submodule update --init --recursive --depth 1

      - name: Configure
        if: steps.existing.outputs.exists == 'false'
        run: |
          cmake -S . -B build -G Ninja \
            -DPICO_BOARD=pico2_w \
            -DPICO_SDK_PATH="$RUNNER_TEMP/pico-sdk"

      - name: Build
        if: steps.existing.outputs.exists == 'false'
        run: cmake --build build

      - name: Size report
        if: steps.existing.outputs.exists == 'false'
        run: arm-none-eabi-size build/rp2350_monitor.elf | tee build/size.txt

      - name: Package release assets
        if: steps.existing.outputs.exists == 'false'
        run: |
          mkdir -p dist
          cp build/rp2350_monitor.uf2 "dist/rp2350_monitor-${{ steps.version.outputs.version }}.uf2"
          cp build/rp2350_monitor.elf "dist/rp2350_monitor-${{ steps.version.outputs.version }}.elf"
          cp build/rp2350_monitor.map "dist/rp2350_monitor-${{ steps.version.outputs.version }}.map"
          cp build/size.txt "dist/rp2350_monitor-${{ steps.version.outputs.version }}-size.txt"
          sha256sum dist/* > "dist/rp2350_monitor-${{ steps.version.outputs.version }}-sha256.txt"

      - name: Create GitHub release
        if: steps.existing.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: RP2350 Monitor ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: dist/*

      - name: Explain skipped release
        if: steps.existing.outputs.exists == 'true'
        run: |
          echo "Release tag ${{ steps.version.outputs.tag }} already exists."
          echo "Bump RPMON_FW_VERSION in CMakeLists.txt before merging another release."
